name: CI build

on:
  pull_request:
    branches:
      - master
      - main
jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: "utf8"
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: |
          npm ci
      - name: Run Linting
        run: |
          ruff check .
      - name: Run Frontend Tests
        run: |
          npm test -- --runInBand
      - name: Run Tests
        run: |
          pytest tests/
